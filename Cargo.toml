[workspace]
resolver = "3"
members = ["app", "crates/*"]

[workspace.package]
repository = "https://github.com/valcubeto/vega"
readme = "README.md"
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
terminal = { path = "crates/terminal" }
args = { path = "crates/args" }
owo-colors = "4.3.0"
colorchoice = "1.0.4"
lazy-regex = "3.6.0"
toml_edit = "0.25.4+spec-1.1.0"
